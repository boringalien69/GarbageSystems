name: Build GarbageSys APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GarbageSys-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (on push to main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: GarbageSys v1.0.${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## GarbageSys Autonomous Trading Agent
            
            ### Install
            1. Download the APK below
            2. On your Android phone: Settings → Security → Unknown Sources → Enable
            3. Open the downloaded APK to install
            4. Follow the in-app setup wizard
            
            ### What's included
            - Local AI model selection based on your phone's RAM
            - Polymarket trading: Weather (NOAA), Whale copy, Crowd contra, Latency arb
            - Auto faucet bootstrap for zero-capital start
            - 50% daily earnings auto-sent to your wallet
            - No cloud dependency — runs fully offline after setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
